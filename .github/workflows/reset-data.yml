name: Reset Data (keep admin)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm wiping all data'
        required: true
        default: ''

jobs:
  reset:
    name: Wipe transactional data
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Abort if not confirmed
        if: ${{ github.event.inputs.confirm != 'YES' }}
        run: |
          echo "Confirmation input was '${{ github.event.inputs.confirm }}' — must be exactly YES"
          exit 1

      - name: Run reset script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/foodpark/backend
            node scripts/reset-data.js
